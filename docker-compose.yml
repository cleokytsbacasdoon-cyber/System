services:
  postgres:
    image: postgres:16-alpine
    container_name: ml-monitoring-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ml_monitoring
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ml_monitoring"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ml-monitoring-backend
    restart: unless-stopped
    environment:
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ml_monitoring
      DB_USER: postgres
      DB_PASSWORD: postgres
      CALENDARIFIC_API_KEY: ${CALENDARIFIC_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/models:/app/models
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ml-monitoring-frontend
    restart: unless-stopped
    environment:
      VITE_USE_MOCK_API: "false"
      VITE_API_BASE_URL: http://localhost:3000/api
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  postgres_data:
